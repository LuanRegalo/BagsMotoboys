<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regalo Pizzeria - Lista Bags Motoboys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1f0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 20% 30%, #0d2a0d 0%, #051405 100%);
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: #1a2e1a;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 8px 20px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 700px;
            border: 1px solid #2a3f2a;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 40%, #0a3d0a 100%);
            padding: 20px 20px 16px;
            text-align: center;
            color: white;
            position: relative;
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .admin-trigger-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .admin-trigger-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        .admin-trigger-btn svg {
            width: 20px;
            height: 20px;
            stroke: white;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .admin-badge {
            display: none;
            background: #3a5c3a;
            color: #dcedc8;
            font-size: 12px;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 20px;
            margin-top: 8px;
            letter-spacing: 0.4px;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .admin-badge.active {
            display: inline-flex;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            padding: 2px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.35);
        }

        .main-content {
            flex: 1;
            padding: 18px 20px 10px;
            display: flex;
            flex-direction: column;
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            flex: 2;
            min-width: 130px;
        }
        .number-wrapper {
            flex: 1;
            min-width: 70px;
        }

        .input-wrapper input,
        .number-wrapper input {
            width: 100%;
            padding: 13px 12px;
            border: 2px solid #3a5c3a;
            border-radius: 16px;
            font-size: 16px;
            background: #243624;
            transition: 0.3s;
            outline: none;
            color: #e8f5e9;
            font-weight: 500;
        }

        .input-wrapper input::placeholder,
        .number-wrapper input::placeholder {
            color: #8ba888;
        }

        .number-wrapper input {
            text-align: center;
        }

        input:focus {
            border-color: #4caf50;
            background: #2a3f2a;
            box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.15);
        }

        .btn-add {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 13px 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-add:hover {
            background: #388e3c;
            transform: translateY(-1px);
        }

        .motoboy-list {
            list-style: none;
            flex: 1;
            overflow-y: auto;
            max-height: 350px;
            margin-bottom: 8px;
        }

        .motoboy-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #243624;
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid #345634;
            animation: fadeIn 0.3s;
        }

        .motoboy-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }

        .motoboy-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .motoboy-details strong {
            font-size: 20px;
            color: #ffffff;
        }
        .motoboy-number {
            font-size: 15px;
            color: #c8e6c9;
            background: #1f2e1f;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 600;
            display: inline-block;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #8ba888;
            cursor: pointer;
            padding: 8px;
            font-size: 20px;
        }
        .btn-remove:hover { color: #a5d6a7; }

        .empty-state {
            text-align: center;
            color: #8ba888;
            padding: 20px;
            font-size: 18px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal {
            background: #1a2e1a;
            border-radius: 24px;
            padding: 28px 24px;
            width: 90%;
            max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            color: #e8f5e9;
        }
        .modal h3 {
            color: #e8f5e9;
        }
        .modal input {
            width: 100%;
            padding: 12px;
            border: 2px solid #3a5c3a;
            border-radius: 12px;
            margin: 15px 0;
            font-size: 16px;
            background: #243624;
            color: #e8f5e9;
        }
        .modal input::placeholder {
            color: #8ba888;
        }
        .modal button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal .close-modal {
            background: transparent;
            color: #8ba888;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Painel admin */
        .admin-panel {
            display: none;
            margin-top: 10px;
            border-top: 2px dashed #3a5c3a;
            padding-top: 15px;
            color: #c8e6c9;
        }
        .admin-panel.active {
            display: block;
        }
        .admin-panel h4 {
            color: #c8e6c9;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-row label {
            color: #c8e6c9;
        }
        .filter-row input[type="date"] {
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #3a5c3a;
            background: #243624;
            color: #e8f5e9;
        }
        .btn-export {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 8px;
            color: #c8e6c9;
        }
        .history-table th {
            background: #243624;
            padding: 8px;
            text-align: left;
        }
        .history-table td {
            padding: 8px;
            border-bottom: 1px solid #2a3f2a;
        }

        .footer {
            text-align: center;
            padding: 12px;
            font-size: 11px;
            color: #8ba888;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <!-- Botão admin com ícone de cadeado -->
        <button class="admin-trigger-btn" id="adminTrigger" title="Acesso administrador">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="11" width="14" height="11" rx="2" />
                <path d="M8 11V7a4 4 0 0 1 8 0v4" />
                <circle cx="12" cy="16" r="1.5" />
            </svg>
        </button>
        <div class="header-title">🎒 Lista Bags Motoboys</div>
        <div class="admin-badge" id="adminBadge">
            🔒 Admin <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
    </div>

    <div class="main-content">
        <div class="input-row">
            <div class="input-wrapper">
                <input type="text" id="motoboyNameInput" placeholder="Nome do motoboy" autocomplete="off" maxlength="40">
            </div>
            <div class="number-wrapper">
                <input type="text" id="bagNumberInput" placeholder="Nº" autocomplete="off" maxlength="10" inputmode="numeric">
            </div>
            <button class="btn-add" id="addButton">➕ Adicionar</button>
        </div>

        <ul class="motoboy-list" id="motoboyList"></ul>
        <div class="empty-state" id="emptyState">📋 Nenhum motoboy registrado.</div>

        <!-- Painel Admin -->
        <div class="admin-panel" id="adminPanel">
            <h4>📜 Histórico de Registros</h4>
            <div class="filter-row">
                <label>Filtrar data:</label>
                <input type="date" id="filterDate">
                <button class="btn-export" id="exportBtn">📥 Exportar Excel</button>
            </div>
            <div style="max-height:200px; overflow-y:auto;">
                <table class="history-table" id="historyTable">
                    <thead><tr><th>Nome</th><th>Nº</th><th>Data/Hora</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    <div class="footer">© 2026 Regalo Pizzeria — Todos os direitos reservados.</div>
</div>

<!-- Modal de senha -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal">
        <h3>🔐 Admin</h3>
        <input type="password" id="passwordInput" placeholder="Senha" autocomplete="off">
        <button id="confirmPasswordBtn">Entrar</button>
        <button class="close-modal" id="closeModalBtn">Cancelar</button>
        <p id="loginError" style="color:#ef9a9a; font-size:13px; display:none;">Senha incorreta</p>
    </div>
</div>

<script>
    (function() {
        const STORAGE_KEY = 'regalo_motoboys_history';
        const ADMIN_PASSWORD = 'regalo2026';

        const nameInput = document.getElementById('motoboyNameInput');
        const numberInput = document.getElementById('bagNumberInput');
        const addButton = document.getElementById('addButton');
        const motoboyList = document.getElementById('motoboyList');
        const emptyState = document.getElementById('emptyState');
        const adminTrigger = document.getElementById('adminTrigger');
        const adminBadge = document.getElementById('adminBadge');
        const logoutBtn = document.getElementById('logoutBtn');
        const adminPanel = document.getElementById('adminPanel');
        const filterDate = document.getElementById('filterDate');
        const exportBtn = document.getElementById('exportBtn');
        const historyTableBody = document.querySelector('#historyTable tbody');
        const passwordModal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        const confirmPasswordBtn = document.getElementById('confirmPasswordBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const loginError = document.getElementById('loginError');

        let isAdmin = false;
        let motoboys = []; // lista da sessão (não persistida)

        // Histórico (persistente em localStorage)
        function getHistorico() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }
        function salvarHistorico(registro) {
            const hist = getHistorico();
            hist.push(registro);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(hist));
        }

        function renderLista() {
            motoboys.sort((a, b) => a.nome.toLowerCase().localeCompare(b.nome.toLowerCase(), 'pt-BR'));

            motoboyList.innerHTML = '';
            if (motoboys.length === 0) {
                emptyState.style.display = 'block';
                motoboyList.style.display = 'none';
            } else {
                emptyState.style.display = 'none';
                motoboyList.style.display = 'block';
                motoboys.forEach((item, idx) => {
                    const li = document.createElement('li');
                    li.className = 'motoboy-item';
                    li.innerHTML = `
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="motoboy-avatar">${item.nome.trim().charAt(0).toUpperCase()}</div>
                            <div class="motoboy-details">
                                <strong>${escapeHTML(item.nome)}</strong>
                                <span class="motoboy-number">Nº ${escapeHTML(item.numero || '—')}</span>
                            </div>
                        </div>
                        <button class="btn-remove" data-index="${idx}">✕</button>
                    `;
                    motoboyList.appendChild(li);
                });
                document.querySelectorAll('.btn-remove').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        motoboys.splice(index, 1);
                        renderLista();
                        if (motoboys.length === 0) nameInput.focus();
                    });
                });
            }
        }

        function adicionarMotoboy() {
            const nome = nameInput.value.trim();
            const numero = numberInput.value.trim();
            if (!nome) {
                nameInput.focus();
                return;
            }
            const novo = { nome, numero, timestamp: new Date().toISOString() };
            motoboys.push({ nome, numero });
            salvarHistorico(novo); // grava no histórico
            nameInput.value = '';
            numberInput.value = '';
            nameInput.focus();
            renderLista();
            if (isAdmin) renderHistorico();
            setTimeout(() => motoboyList.scrollTop = motoboyList.scrollHeight, 50);
        }

        addButton.addEventListener('click', adicionarMotoboy);
        nameInput.addEventListener('keypress', e => { if (e.key === 'Enter') adicionarMotoboy(); });
        numberInput.addEventListener('keypress', e => { if (e.key === 'Enter') adicionarMotoboy(); });

        // Admin
        function loginAdmin() {
            isAdmin = true;
            adminBadge.classList.add('active');
            adminPanel.classList.add('active');
            renderHistorico();
        }
        function logoutAdmin() {
            isAdmin = false;
            adminBadge.classList.remove('active');
            adminPanel.classList.remove('active');
            filterDate.value = '';
        }

        adminTrigger.addEventListener('click', () => {
            if (isAdmin) return;
            passwordModal.style.display = 'flex';
            passwordInput.value = '';
            loginError.style.display = 'none';
            passwordInput.focus();
        });

        confirmPasswordBtn.addEventListener('click', () => {
            if (passwordInput.value === ADMIN_PASSWORD) {
                passwordModal.style.display = 'none';
                loginAdmin();
            } else {
                loginError.style.display = 'block';
                passwordInput.focus();
            }
        });
        closeModalBtn.addEventListener('click', () => passwordModal.style.display = 'none');
        passwordInput.addEventListener('keypress', e => {
            if (e.key === 'Enter') confirmPasswordBtn.click();
        });
        window.addEventListener('click', e => {
            if (e.target === passwordModal) passwordModal.style.display = 'none';
        });

        logoutBtn.addEventListener('click', logoutAdmin);

        // Histórico e exportação
        function renderHistorico(dataFiltro = null) {
            let historico = getHistorico();
            if (dataFiltro) {
                historico = historico.filter(item => {
                    const dataItem = new Date(item.timestamp).toISOString().split('T')[0];
                    return dataItem === dataFiltro;
                });
            }
            historyTableBody.innerHTML = '';
            historico.slice().reverse().forEach(item => {
                const tr = document.createElement('tr');
                const dataFormatada = new Date(item.timestamp).toLocaleString('pt-BR');
                tr.innerHTML = `<td>${escapeHTML(item.nome)}</td><td>${escapeHTML(item.numero || '—')}</td><td>${dataFormatada}</td>`;
                historyTableBody.appendChild(tr);
            });
        }

        filterDate.addEventListener('change', () => {
            renderHistorico(filterDate.value);
        });

        exportBtn.addEventListener('click', () => {
            let historico = getHistorico();
            if (filterDate.value) {
                historico = historico.filter(item => new Date(item.timestamp).toISOString().split('T')[0] === filterDate.value);
            }
            if (historico.length === 0) {
                alert('Nenhum registro para exportar.');
                return;
            }
            let csv = 'Nome,Número,Data/Hora\n';
            historico.forEach(item => {
                const data = new Date(item.timestamp).toLocaleString('pt-BR');
                csv += `"${item.nome}","${item.numero || ''}","${data}"\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `regalo_historico_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(url);
        });

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        renderLista();
        nameInput.focus();
    })();
</script>
</body>
</html>
